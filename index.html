<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NSE Options Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #11111a;
    --surface2: #1a1a27;
    --border: #2a2a3f;
    --accent: #f0b429;
    --bull: #00e676;
    --bear: #ff3d57;
    --neutral: #8888aa;
    --text: #e8e8f0;
    --text2: #7777aa;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(240,180,41,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,180,41,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; padding: 0 0 80px; }

  .header {
    background: linear-gradient(180deg, #0d0d18 0%, transparent 100%);
    padding: 24px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .logo {
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .refresh-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .refresh-badge.live { border-color: var(--bull); color: var(--bull); }

  .tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .index-hero {
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 4px;
  }

  .index-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .index-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .index-card.bear-card::after { background: var(--bear); }
  .index-card.bull-card::after { background: var(--bull); }

  .index-name {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .index-price {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .index-change {
    font-family: var(--mono);
    font-size: 11px;
  }

  .up { color: var(--bull); }
  .down { color: var(--bear); }
  .neu { color: var(--neutral); }

  .section {
    padding: 0 20px;
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text2);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .expiry-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    margin-bottom: 16px;
  }
  .expiry-row::-webkit-scrollbar { display: none; }

  .expiry-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .expiry-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(240,180,41,0.1);
  }

  .chain-header {
    display: grid;
    grid-template-columns: 1fr 60px 80px 1fr;
    gap: 4px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text2);
    letter-spacing: 0.5px;
    background: var(--surface2);
    border-radius: 8px 8px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
  }

  .chain-header .call-head { color: var(--bull); }
  .chain-header .put-head { color: var(--bear); text-align: right; }
  .chain-header .strike-head { text-align: center; }

  .chain-row {
    display: grid;
    grid-template-columns: 1fr 60px 80px 1fr;
    gap: 4px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-top: none;
    background: var(--surface);
    transition: background 0.15s;
    cursor: pointer;
  }

  .chain-row:last-child { border-radius: 0 0 8px 8px; }
  .chain-row:hover { background: var(--surface2); }

  .chain-row.atm {
    background: rgba(240,180,41,0.06);
    border-color: rgba(240,180,41,0.3);
  }

  .call-side {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .put-side {
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: flex-end;
  }

  .opt-price {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
  }

  .opt-oi {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text2);
  }

  .strike-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .strike-val {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
  }

  .atm-badge {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--accent);
    background: rgba(240,180,41,0.15);
    padding: 1px 5px;
    border-radius: 4px;
  }

  .pcr-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .pcr-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .pcr-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .pcr-label {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 16px;
  }

  .oi-bar {
    height: 8px;
    border-radius: 4px;
    background: var(--surface2);
    overflow: hidden;
    margin-bottom: 8px;
  }

  .oi-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--bull), var(--bear));
    transition: width 0.8s ease;
  }

  .oi-labels {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text2);
  }

  .oi-labels .call-oi { color: var(--bull); }
  .oi-labels .put-oi { color: var(--bear); }

  .greeks-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .greek-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
  }

  .greek-name {
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .greek-val {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
  }

  .signal-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 12px;
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
  }

  .signal-pill.bull { background: rgba(0,230,118,0.15); color: var(--bull); border: 1px solid rgba(0,230,118,0.3); }
  .signal-pill.bear { background: rgba(255,61,87,0.15); color: var(--bear); border: 1px solid rgba(255,61,87,0.3); }
  .signal-pill.neu { background: rgba(136,136,170,0.15); color: var(--neutral); border: 1px solid rgba(136,136,170,0.3); }

  .maxpain-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }

  .error-box {
    background: rgba(255,61,87,0.1);
    border: 1px solid rgba(255,61,87,0.3);
    border-radius: 12px;
    padding: 16px;
    margin: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--bear);
    text-align: center;
    line-height: 1.6;
  }

  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 12px 20px 20px;
    gap: 8px;
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .nav-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .fade-in {
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .note-box {
    margin: 0 20px 16px;
    background: rgba(240,180,41,0.08);
    border: 1px solid rgba(240,180,41,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--accent);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="header-top">
      <div class="logo">⚡ NSE <span>Options</span></div>
      <div class="refresh-badge live" id="refreshBadge">Loading...</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchIndex('NIFTY')">NIFTY 50</button>
      <button class="tab" onclick="switchIndex('BANKNIFTY')">BANK NIFTY</button>
    </div>
  </div>

  <div id="mainContent">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Fetching options data...</div>
    </div>
  </div>

</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchView('chain')">CHAIN</button>
  <button class="nav-btn" onclick="switchView('pcr')">PCR / OI</button>
  <button class="nav-btn" onclick="switchView('greeks')">GREEKS</button>
  <button class="nav-btn" onclick="switchView('signals')">SIGNALS</button>
</div>

<script>
  let currentIndex = 'NIFTY';
  let currentView = 'chain';
  let currentExpiry = 0;
  let data = null;
  let countdown = 30;
  let timer = null;

  async function fetchOptionsData(symbol) {
    const ySymbol = symbol === 'NIFTY' ? '^NSEI' : '^NSEBANK';
    const url = `https://query1.finance.yahoo.com/v7/finance/options/${encodeURIComponent(ySymbol)}`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy);
    const json = await res.json();
    const parsed = JSON.parse(json.contents);
    return parsed.optionChain.result[0];
  }

  async function fetchQuote(symbol) {
    const ySymbol = symbol === 'NIFTY' ? '^NSEI' : '^NSEBANK';
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ySymbol)}?interval=1d&range=2d`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy);
    const json = await res.json();
    const parsed = JSON.parse(json.contents);
    const q = parsed.chart.result[0].meta;
    return {
      price: q.regularMarketPrice,
      prev: q.previousClose,
      change: q.regularMarketPrice - q.previousClose,
      changePct: ((q.regularMarketPrice - q.previousClose) / q.previousClose * 100)
    };
  }

  function fmt(n) {
    if (!n) return '—';
    if (n >= 10000000) return (n/10000000).toFixed(2) + 'Cr';
    if (n >= 100000) return (n/100000).toFixed(2) + 'L';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return n.toFixed(2);
  }

  function fmtPrice(n) {
    if (!n) return '—';
    return '₹' + n.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  function getSignal(pcr) {
    if (pcr > 1.3) return { label: '▲ BULLISH', cls: 'bull' };
    if (pcr < 0.7) return { label: '▼ BEARISH', cls: 'bear' };
    return { label: '— NEUTRAL', cls: 'neu' };
  }

  function calcMaxPain(calls, puts, strikes) {
    let minLoss = Infinity, maxPainStrike = 0;
    for (const s of strikes) {
      let loss = 0;
      for (const c of calls) { loss += Math.max(0, s - c.strike) * (c.openInterest || 0); }
      for (const p of puts) { loss += Math.max(0, p.strike - s) * (p.openInterest || 0); }
      if (loss < minLoss) { minLoss = loss; maxPainStrike = s; }
    }
    return maxPainStrike;
  }

  async function loadData() {
    try {
      document.getElementById('refreshBadge').textContent = 'Refreshing...';
      document.getElementById('refreshBadge').className = 'refresh-badge';
      const [optData, quote] = await Promise.all([
        fetchOptionsData(currentIndex),
        fetchQuote(currentIndex)
      ]);
      data = { optData, quote };
      renderView();
      document.getElementById('refreshBadge').textContent = 'LIVE';
      document.getElementById('refreshBadge').className = 'refresh-badge live';
      countdown = 30;
    } catch (e) {
      document.getElementById('mainContent').innerHTML = `
        <div class="error-box">
          ⚠️ Could not load options data.<br>
          NSE data may be unavailable outside market hours.<br><br>
          <small>Error: ${e.message}</small>
        </div>
        <div class="note-box">
          💡 NSE options data is only available during market hours (9:15 AM – 3:30 PM IST) on trading days.
        </div>
      `;
      document.getElementById('refreshBadge').textContent = 'ERROR';
    }
  }

  function renderView() {
    if (!data) return;
    const { optData, quote } = data;
    const expiryDates = optData.expirationDates;
    const selectedExpiry = expiryDates[currentExpiry];
    const chain = optData.options.find(o => o.expirationDate === selectedExpiry) || optData.options[0];
    const calls = chain?.calls || [];
    const puts = chain?.puts || [];
    const spotPrice = quote.price;

    const strikes = [...new Set([...calls.map(c => c.strike), ...puts.map(p => p.strike)])].sort((a,b) => a-b);
    const atmStrike = strikes.reduce((prev, curr) => Math.abs(curr - spotPrice) < Math.abs(prev - spotPrice) ? curr : prev, strikes[0]);

    const totalCallOI = calls.reduce((s, c) => s + (c.openInterest || 0), 0);
    const totalPutOI = puts.reduce((s, p) => s + (p.openInterest || 0), 0);
    const pcr = totalPutOI / (totalCallOI || 1);
    const signal = getSignal(pcr);
    const maxPain = calcMaxPain(calls, puts, strikes);

    const expiryBtns = expiryDates.slice(0, 6).map((ts, i) => {
      const d = new Date(ts * 1000);
      const label = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
      const isWeekly = i < 2;
      return `<button class="expiry-btn ${i === currentExpiry ? 'active' : ''}" onclick="selectExpiry(${i})">
        ${label} ${isWeekly ? '(W)' : '(M)'}
      </button>`;
    }).join('');

    const heroHTML = `
      <div class="index-hero">
        <div class="index-card ${quote.change >= 0 ? 'bull-card' : 'bear-card'}">
          <div class="index-name">${currentIndex}</div>
          <div class="index-price ${quote.change >= 0 ? 'up' : 'down'}">${fmtPrice(quote.price)}</div>
          <div class="index-change ${quote.change >= 0 ? 'up' : 'down'}">
            ${quote.change >= 0 ? '▲' : '▼'} ${Math.abs(quote.change).toFixed(2)} (${Math.abs(quote.changePct).toFixed(2)}%)
          </div>
        </div>
        <div class="index-card">
          <div class="index-name">SIGNAL</div>
          <div style="margin-top: 8px"><span class="signal-pill ${signal.cls}">${signal.label}</span></div>
          <div style="margin-top: 10px; font-family: var(--mono); font-size: 11px; color: var(--text2)">
            MAX PAIN<br><span style="color: var(--accent); font-size: 14px">₹${maxPain.toLocaleString('en-IN')}</span>
          </div>
        </div>
      </div>
    `;

    let viewHTML = '';

    if (currentView === 'chain') {
      const atmIndex = strikes.indexOf(atmStrike);
      const start = Math.max(0, atmIndex - 7);
      const end = Math.min(strikes.length, atmIndex + 8);
      const visibleStrikes = strikes.slice(start, end);

      const rows = visibleStrikes.map(s => {
        const call = calls.find(c => c.strike === s);
        const put = puts.find(p => p.strike === s);
        const isATM = s === atmStrike;
        return `
          <div class="chain-row ${isATM ? 'atm' : ''}">
            <div class="call-side">
              <div class="opt-price up">${call ? fmtPrice(call.lastPrice) : '—'}</div>
              <div class="opt-oi">OI: ${fmt(call?.openInterest)}</div>
              <div class="opt-oi">IV: ${call?.impliedVolatility ? (call.impliedVolatility * 100).toFixed(1) + '%' : '—'}</div>
            </div>
            <div class="strike-col">
              <div class="strike-val">${s.toLocaleString('en-IN')}</div>
              ${isATM ? '<div class="atm-badge">ATM</div>' : ''}
            </div>
            <div style="width:80px"></div>
            <div class="put-side">
              <div class="opt-price down">${put ? fmtPrice(put.lastPrice) : '—'}</div>
              <div class="opt-oi">OI: ${fmt(put?.openInterest)}</div>
              <div class="opt-oi">IV: ${put?.impliedVolatility ? (put.impliedVolatility * 100).toFixed(1) + '%' : '—'}</div>
            </div>
          </div>
        `;
      }).join('');

      viewHTML = `
        <div class="section">
          <div class="section-title">OPTION CHAIN</div>
          <div class="expiry-row">${expiryBtns}</div>
          <div class="chain-header">
            <div class="call-head">CALL ▲</div>
            <div class="strike-head">STRIKE</div>
            <div></div>
            <div class="put-head">▼ PUT</div>
          </div>
          ${rows}
        </div>
      `;

    } else if (currentView === 'pcr') {
      const callPct = (totalCallOI / (totalCallOI + totalPutOI) * 100).toFixed(1);
      const putPct = (totalPutOI / (totalCallOI + totalPutOI) * 100).toFixed(1);
      const topCalls = [...calls].sort((a,b) => (b.openInterest||0)-(a.openInterest||0)).slice(0,5);
      const topPuts = [...puts].sort((a,b) => (b.openInterest||0)-(a.openInterest||0)).slice(0,5);

      viewHTML = `
        <div class="section">
          <div class="section-title">PCR & OI ANALYSIS</div>
          <div class="expiry-row">${expiryBtns}</div>
          <div class="pcr-card">
            <div class="pcr-title">PUT-CALL RATIO</div>
            <div class="pcr-value ${pcr > 1 ? 'up' : 'down'}">${pcr.toFixed(3)}</div>
            <div class="pcr-label">${pcr > 1.3 ? '🟢 Bullish sentiment' : pcr < 0.7 ? '🔴 Bearish sentiment' : '🟡 Neutral market'}</div>
            <div class="oi-bar">
              <div class="oi-bar-fill" style="width: ${callPct}%"></div>
            </div>
            <div class="oi-labels">
              <span class="call-oi">CALL OI ${callPct}% — ${fmt(totalCallOI)}</span>
              <span class="put-oi">${fmt(totalPutOI)} — ${putPct}% PUT OI</span>
            </div>
          </div>
          <div class="section-title">TOP CALL OI STRIKES</div>
          ${topCalls.map(c => `
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
              <span style="font-family:var(--mono);font-size:13px;color:var(--bull)">₹${c.strike.toLocaleString('en-IN')}</span>
              <span style="font-family:var(--mono);font-size:11px;color:var(--text2)">OI: ${fmt(c.openInterest)} | LTP: ${fmtPrice(c.lastPrice)}</span>
            </div>
          `).join('')}
          <div class="section-title" style="margin-top:16px">TOP PUT OI STRIKES</div>
          ${topPuts.map(p => `
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
              <span style="font-family:var(--mono);font-size:13px;color:var(--bear)">₹${p.strike.toLocaleString('en-IN')}</span>
              <span style="font-family:var(--mono);font-size:11px;color:var(--text2)">OI: ${fmt(p.openInterest)} | LTP: ${fmtPrice(p.lastPrice)}</span>
            </div>
          `).join('')}
        </div>
      `;

    } else if (currentView === 'greeks') {
      const atmCall = calls.find(c => c.strike === atmStrike);
      const atmPut = puts.find(p => p.strike === atmStrike);

      viewHTML = `
        <div class="section">
          <div class="section-title">ATM GREEKS — ₹${atmStrike.toLocaleString('en-IN')}</div>
          <div class="expiry-row">${expiryBtns}</div>
          <div style="margin-bottom:8px;font-family:var(--mono);font-size:10px;color:var(--bull)">▲ CALL</div>
          <div class="greeks-grid" style="margin-bottom:16px">
            <div class="greek-card"><div class="greek-name">LTP</div><div class="greek-val up">${fmtPrice(atmCall?.lastPrice)}</div></div>
            <div class="greek-card"><div class="greek-name">IV</div><div class="greek-val">${atmCall?.impliedVolatility ? (atmCall.impliedVolatility*100).toFixed(1)+'%' : '—'}</div></div>
            <div class="greek-card"><div class="greek-name">OPEN INT</div><div class="greek-val">${fmt(atmCall?.openInterest)}</div></div>
            <div class="greek-card"><div class="greek-name">VOLUME</div><div class="greek-val">${fmt(atmCall?.volume)}</div></div>
          </div>
          <div style="margin-bottom:8px;font-family:var(--mono);font-size:10px;color:var(--bear)">▼ PUT</div>
          <div class="greeks-grid">
            <div class="greek-card"><div class="greek-name">LTP</div><div class="greek-val down">${fmtPrice(atmPut?.lastPrice)}</div></div>
            <div class="greek-card"><div class="greek-name">IV</div><div class="greek-val">${atmPut?.impliedVolatility ? (atmPut.impliedVolatility*100).toFixed(1)+'%' : '—'}</div></div>
            <div class="greek-card"><div class="greek-name">OPEN INT</div><div class="greek-val">${fmt(atmPut?.openInterest)}</div></div>
            <div class="greek-card"><div class="greek-name">VOLUME</div><div class="greek-val">${fmt(atmPut?.volume)}</div></div>
          </div>
          <div class="note-box" style="margin: 16px 0 0">
            💡 Full Greeks (Delta, Gamma, Theta, Vega) require a paid options data provider. Yahoo Finance provides IV and OI only.
          </div>
        </div>
      `;

    } else if (currentView === 'signals') {
      const topCallStrike = [...calls].sort((a,b)=>(b.openInterest||0)-(a.openInterest||0))[0]?.strike;
      const topPutStrike = [...puts].sort((a,b)=>(b.openInterest||0)-(a.openInterest||0))[0]?.strike;
      const trend = quote.change >= 0 ? 'UPTREND' : 'DOWNTREND';
      const trendCls = quote.change >= 0 ? 'up' : 'down';

      viewHTML = `
        <div class="section">
          <div class="section-title">MARKET SIGNALS</div>
          <div style="display:flex;flex-direction:column;gap:10px">
            <div class="pcr-card">
              <div class="pcr-title">OVERALL SIGNAL</div>
              <div style="margin-top:8px"><span class="signal-pill ${signal.cls}" style="font-size:16px;padding:8px 20px">${signal.label}</span></div>
            </div>
            <div class="pcr-card">
              <div class="pcr-title">PRICE TREND</div>
              <div class="pcr-value ${trendCls}">${trend}</div>
              <div class="pcr-label">${currentIndex} ${quote.change >= 0 ? '▲' : '▼'} ${Math.abs(quote.changePct).toFixed(2)}% today</div>
            </div>
            <div class="pcr-card">
              <div class="pcr-title">MAX PAIN LEVEL</div>
              <div class="pcr-value" style="color:var(--accent)">₹${maxPain.toLocaleString('en-IN')}</div>
              <div class="pcr-label">Current: ₹${Math.round(spotPrice).toLocaleString('en-IN')} | ${spotPrice > maxPain ? '▲ Above max pain' : '▼ Below max pain'}</div>
            </div>
            <div class="pcr-card">
              <div class="pcr-title">KEY RESISTANCE / SUPPORT</div>
              <div style="display:flex;justify-content:space-between;margin-top:8px">
                <div>
                  <div style="font-size:10px;color:var(--bear);margin-bottom:4px">RESISTANCE (Top Call OI)</div>
                  <div style="font-family:var(--mono);font-size:18px;color:var(--bear)">₹${topCallStrike?.toLocaleString('en-IN') || '—'}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:10px;color:var(--bull);margin-bottom:4px">SUPPORT (Top Put OI)</div>
                  <div style="font-family:var(--mono);font-size:18px;color:var(--bull)">₹${topPutStrike?.toLocaleString('en-IN') || '—'}</div>
                </div>
              </div>
            </div>
            <div class="pcr-card">
              <div class="pcr-title">PUT-CALL RATIO</div>
              <div class="pcr-value ${pcr > 1 ? 'up' : 'down'}">${pcr.toFixed(3)}</div>
              <div class="pcr-label">${pcr > 1.3 ? 'Bullish — More puts being bought (hedging)' : pcr < 0.7 ? 'Bearish — More calls being bought' : 'Neutral — Balanced positioning'}</div>
            </div>
          </div>
        </div>
      `;
    }

    document.getElementById('mainContent').innerHTML = `
      <div class="fade-in">${heroHTML}${viewHTML}</div>
    `;
  }

  function switchIndex(idx) {
    currentIndex = idx;
    currentExpiry = 0;
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', (idx === 'NIFTY' && i === 0) || (idx === 'BANKNIFTY' && i === 1));
    });
    data = null;
    document.getElementById('mainContent').innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Fetching ${idx} data...</div></div>`;
    loadData();
  }

  function switchView(view) {
    currentView = view;
    document.querySelectorAll('.nav-btn').forEach((b,i) => {
      b.classList.toggle('active', ['chain','pcr','greeks','signals'][i] === view);
    });
    if (data) renderView();
  }

  function selectExpiry(i) {
    currentExpiry = i;
    if (data) renderView();
  }

  function startTimer() {
    if (timer) clearInterval(timer);
    timer = setInterval(() => {
      countdown--;
      if (countdown <= 0) { loadData(); countdown = 30; }
      const badge = document.getElementById('refreshBadge');
      if (badge && badge.className.includes('live')) {
        badge.textContent = `LIVE · ${countdown}s`;
      }
    }, 1000);
  }

  loadData();
  startTimer();
</script>
</body>
</html>
